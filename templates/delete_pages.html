<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Pages — ConverterPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #0F6E56; --green-light: #1D9E75; --green-pale: #E8F5F0;
      --text: #1A1A2E; --muted: #6B7280; --border: #E5E7EB;
    }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0faf6 0%, #ffffff 60%); min-height: 100vh; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 3rem; }
    .logo { font-size: 1.8rem; font-weight: 800; color: var(--green); margin-bottom: 1rem; cursor: pointer; }
    h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
    .subtitle { font-size: 1rem; color: var(--muted); }
    .card { background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    
    .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 2rem; }
    .upload-area:hover, .upload-area.dragover { border-color: var(--green); background: var(--green-pale); }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .upload-text { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
    .upload-hint { font-size: 0.9rem; color: var(--muted); }
    input[type="file"] { display: none; }
    
    .file-info { background: var(--green-pale); border-radius: 8px; padding: 1rem; margin-bottom: 2rem; display: none; }
    .file-info.show { display: block; }
    .file-name { font-weight: 600; color: var(--text); }
    .file-size { font-size: 0.85rem; color: var(--muted); }
    
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
    input[type="text"] { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; font-family: 'Inter', sans-serif; }
    input[type="text"]:focus { outline: none; border-color: var(--green); background: var(--green-pale); }
    
    .hint { font-size: 0.85rem; color: var(--muted); margin-top: 0.4rem; }
    
    .delete-btn { width: 100%; padding: 1rem; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .delete-btn:hover:not(:disabled) { background: var(--green-light); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(15,110,86,0.3); }
    .delete-btn:disabled { background: #ccc; cursor: not-allowed; }
    
    .progress-container { display: none; margin-top: 1.5rem; }
    .progress-container.show { display: block; }
    .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light)); width: 0%; transition: width 0.2s; }
    .progress-text { font-size: 0.85rem; color: var(--muted); text-align: center; }
    
    .status { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; text-align: center; display: none; font-weight: 500; }
    .status.show { display: block; }
    .status.error { background: #FEE2E2; color: #DC2626; }
    .status.success { background: var(--green-pale); color: var(--green); }
    .status.loading { background: #EFF6FF; color: #2563EB; }
    
    .back-link { display: inline-block; margin-top: 2rem; color: var(--green); font-weight: 600; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo" onclick="window.location.href='/'">ConverterPro</div>
      <h1>🗑️ Delete Pages</h1>
      <p class="subtitle">Remove unwanted pages from your PDF instantly</p>
    </div>

    <div class="card">
      <form id="deleteForm" enctype="multipart/form-data">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Click to upload or drag &amp; drop</div>
          <div class="upload-hint">PDF files only (Max 15MB)</div>
          <input type="file" id="fileInput" name="file" accept=".pdf">
        </div>

        <div class="file-info" id="fileInfo">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>

        <div class="input-group" id="pageInputGroup" style="display:none;">
          <label for="pageNumbers">Pages to delete:</label>
          <input type="text" id="pageNumbers" name="page_numbers" placeholder="Examples: 1, 3, 5 or 2-4 or 1,3,5-7">
          <div class="hint">✓ Separate with commas (e.g., 1, 3, 5) or use ranges (e.g., 2-4)</div>
          <div class="hint">✓ Page numbers start from 1</div>
        </div>

        <button type="submit" class="delete-btn" id="deleteBtn" disabled>Delete Pages</button>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="status" id="status"></div>
      </form>

      <a href="/converter" class="back-link">← Back to Converter</a>
    </div>
  </div>

  <script>
    const MAX_FILE_SIZE = 15 * 1024 * 1024;
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const pageInputGroup = document.getElementById('pageInputGroup');
    const pageNumbersInput = document.getElementById('pageNumbers');
    const deleteBtn = document.getElementById('deleteBtn');
    const statusEl = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    let selectedFile = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) { showStatus('❌ Only PDF files are supported', 'error'); fileInput.value = ''; return; }
      if (file.size > MAX_FILE_SIZE) { showStatus(`❌ File too large! Max 15MB (yours is ${formatSize(file.size)})`, 'error'); fileInput.value = ''; return; }
      selectedFile = file;
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatSize(file.size);
      fileInfo.classList.add('show');
      pageInputGroup.style.display = 'block';
      deleteBtn.disabled = true;
      pageNumbersInput.value = '';
      hideStatus();
    }

    pageNumbersInput.addEventListener('input', () => {
      deleteBtn.disabled = !pageNumbersInput.value.trim();
    });

    document.getElementById('deleteForm').addEventListener('submit', async e => {
      e.preventDefault();
      if (!selectedFile) { showStatus('Please select a PDF file', 'error'); return; }
      const pageNumbers = pageNumbersInput.value.trim();
      if (!pageNumbers) { showStatus('Please specify pages to delete', 'error'); return; }

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('output_format', 'delete_pages');
      formData.append('page_numbers', pageNumbers);

      deleteBtn.disabled = true;
      deleteBtn.textContent = 'Deleting...';
      progressContainer.classList.add('show');
      showStatus('🔄 Processing...', 'loading');

      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        progressFill.style.width = '100%';
        progressText.textContent = '100%';
        if (xhr.status === 200) {
          showStatus('✓ Done! Downloading...', 'success');
          const blob = new Blob([xhr.response], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = selectedFile.name.replace('.pdf', '_deleted.pdf');
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          resetProgress();
        } else {
          let msg = 'Failed to delete pages';
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch (_) {}
          showStatus('❌ Error: ' + msg, 'error');
          resetProgress();
        }
      });

      xhr.addEventListener('error', () => { showStatus('❌ Network error', 'error'); resetProgress(); });
      xhr.responseType = 'arraybuffer';
      xhr.open('POST', '/convert');
      xhr.send(formData);

      deleteBtn.disabled = false;
      deleteBtn.textContent = 'Delete Pages';
    });

    function resetProgress() { progressFill.style.width = '0%'; progressText.textContent = '0%'; progressContainer.classList.remove('show'); }
    function showStatus(msg, type) { statusEl.textContent = msg; statusEl.className = 'status show ' + type; }
    function hideStatus() { statusEl.className = 'status'; }
    function formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
  </script>
</body>
</html>
